<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#16a7dc" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="东莞城市学院" />
    <meta property="og:title" content="东莞城市学院 2025 招生简章" />
    <meta property="og:description" content="东莞城市学院 2025 年本科招生简章手机 H5，点击查看完整图文内容。" />
    <meta property="og:image" content="./page-01.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="东莞城市学院 2025 招生简章" />
    <meta name="twitter:description" content="东莞城市学院 2025 年本科招生简章手机 H5，点击查看完整图文内容。" />
    <meta name="twitter:image" content="./page-01.webp" />
    <link rel="image_src" href="./page-01.webp" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="home-hero" id="top">
        <div class="hero-glass">
          <div class="brand-lockup">
            <div class="brand-mark">城</div>
            <div>
              <strong>东莞城市学院</strong>
              <span>DONGGUAN CITY UNIVERSITY</span>
            </div>
          </div>

          <button class="menu-button" type="button" data-action="more" aria-label="打开更多功能">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>

        <div class="hero-content">
          <p>Admissions 2025</p>
          <h1>东莞城市学院<br /><em>2025</em><br />招生简章</h1>
          <div class="hero-meta">
            <span>院校代码 13844</span>
            <span>本科招生</span>
          </div>
          <button class="primary-cta" type="button" data-action="show-chapters">查看简章章节</button>
        </div>

        <div class="hero-photo">
          <img src="./page-01.webp" alt="东莞城市学院招生简章封面" />
        </div>

        <button class="scroll-cue" type="button" data-action="show-chapters" aria-label="查看章节">⌄</button>
      </header>

      <main>
        <section class="chapter-home" id="chapters" aria-labelledby="chaptersTitle">
          <div class="section-title">
            <span></span>
            <div>
              <p>点击章节进入阅读</p>
              <h2 id="chaptersTitle">简章章节</h2>
            </div>
          </div>
          <div class="chapter-grid" id="chapterGrid"></div>
        </section>

        <section class="reader-view" id="reader" aria-label="章节内容" aria-hidden="true">
          <div class="reader-top">
            <button type="button" data-action="close-reader">‹ 章节</button>
            <div>
              <strong id="readerTitle">封面</strong>
              <span id="readerCount">第 1 / 16 页</span>
            </div>
            <button type="button" data-action="open-viewer">放大</button>
          </div>

          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>

          <article class="page-stage" id="pageStage">
            <button class="page-arrow prev" type="button" data-action="prev-page" aria-label="上一页">‹</button>
            <img id="readerImage" src="./page-01.webp" alt="招生简章页面" />
            <button class="page-arrow next" type="button" data-action="next-page" aria-label="下一页">›</button>
          </article>

          <div class="reader-actions">
            <button type="button" data-action="prev-page">上一页</button>
            <button type="button" data-action="toggle-menu">目录</button>
            <button type="button" data-action="next-page">下一页</button>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <button type="button" data-action="back-home"><span>▦</span>章节</button>
        <button type="button" data-action="share"><span>⌕</span>分享</button>
        <button class="pager-pill" type="button" data-action="open-viewer">
          <i>‹</i><b id="bottomCount">1 / 16</b><i>›</i>
        </button>
        <button type="button" data-action="more"><span>☰</span>更多</button>
      </nav>
    </div>

    <aside class="toc-drawer" id="tocDrawer" aria-hidden="true">
      <div class="drawer-backdrop" data-action="close-menu"></div>
      <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
        <div class="drawer-head">
          <div>
            <strong id="drawerTitle">目录</strong>
            <span>点击章节快速阅读</span>
          </div>
          <button class="close-button" type="button" data-action="close-menu" aria-label="关闭目录">×</button>
        </div>
        <div class="drawer-list" id="drawerList"></div>
      </div>
    </aside>

    <aside class="more-panel" id="morePanel" aria-hidden="true">
      <div class="drawer-backdrop" data-action="close-more"></div>
      <div class="more-card" role="dialog" aria-modal="true" aria-labelledby="moreTitle">
        <div class="drawer-head">
          <div>
            <strong id="moreTitle">更多</strong>
            <span>常用操作</span>
          </div>
          <button class="close-button" type="button" data-action="close-more" aria-label="关闭更多">×</button>
        </div>
        <button type="button" data-action="show-chapters">查看简章章节</button>
        <button type="button" data-action="contact-page">联系方式</button>
        <button type="button" data-action="share">分享链接</button>
      </div>
    </aside>

    <div class="viewer" id="viewer" aria-hidden="true">
      <div class="viewer-top">
        <strong id="viewerTitle">第 1 页</strong>
        <button type="button" data-action="close-viewer" aria-label="关闭大图">×</button>
      </div>
      <div class="viewer-canvas">
        <img id="viewerImage" alt="" />
      </div>
      <div class="viewer-nav">
        <button type="button" data-action="viewer-prev">上一页</button>
        <button type="button" data-action="viewer-next">下一页</button>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
